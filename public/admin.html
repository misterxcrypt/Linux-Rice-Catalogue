<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Gallery Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="OptimizedImage.js"></script>
    <style>
        :root {
            --bg-color: #0A0A0F;
            --panel-bg: rgba(22, 22, 30, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #5D5FEF;
            --accent-glow: rgba(93, 95, 239, 0.4);
            --text-color: #E0E0E0;
            --muted-text: #A0A0A0;
            transition: --accent-color 1s ease, --accent-glow 1s ease, --bg-color 1s ease, --text-color 1s ease;
        }

        .light-mode {
            --bg-color: #F8F9FA;
            --panel-bg: rgba(255, 255, 255, 0.4);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-color: #212529;
            --muted-text: #6C757D;
        }

        @property --accent-color { syntax: '<color>'; initial-value: #5D5FEF; inherits: true; }
        @property --accent-glow { syntax: '<color>'; initial-value: rgba(93, 95, 239, 0.4); inherits: true; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.02) 1px, transparent 0),
                radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 45%);
            background-size: 30px 30px, 100% 100%;
            background-repeat: repeat, no-repeat;
            transition: background-color 1s ease, background-position 1s ease-out;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background-color: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-color);
        }
        .tab-btn.active {
            background: var(--accent-color);
            color: #fff;
        }

        #mood-switcher-panel { transform: translateX(100%); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; min-width: 180px; }
        #mood-switcher-panel.open { transform: translateX(0); opacity: 1; }
        #mood-switcher-btn { transition: background-color 1s ease; }

        input::placeholder {
            color: var(--placeholder-color);
        }

        /* Ko-fi button font consistency */
        #kofi-button button {
            font-family: 'Inter', sans-serif !important;
            font-size: 14px !important;
        }
    </style>
</head>
<body class="min-h-screen text-gray-300">
    <div class="p-4 md:p-6 lg:p-8">
        <header class="mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
            <!--  <img src="https://raw.githubusercontent.com/zemmsoares/awesome-rices/main/assets/logo.webp" alt="Awesome Rices logo" class="w-10 h-10"> -->
              <h1 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--text-color)">Admin Dashboard</h1>
            </div>
          
            <div class="flex items-center gap-3">
              <a href="/" class="glass-panel px-4 py-2 rounded-lg font-semibold hover:bg-white/10" style="color: var(--text-color)">
                Back to Gallery
              </a>
              <button
                id="logout-btn"
                title="Logout"
                class="glass-panel bg-[var(--accent-color)] px-4 py-2 rounded-lg text-white font-semibold hover:bg-white/10"
              >
                <span class="material-icons-outlined text-lg text-gray-300">logout</span>
              </button>
            </div>
        </header>          
        <div class="mb-8 flex gap-4">
            <button id="tab-submissions" class="tab-btn px-6 py-2 rounded-lg font-semibold active">Submissions</button>
            <button id="tab-stats" class="tab-btn px-6 py-2 rounded-lg font-semibold">Stats</button>
            <button id="tab-keywords" class="tab-btn px-6 py-2 rounded-lg font-semibold">Keywords</button>
        </div>
        <!-- Submissions Section -->
        <section id="submissions-section" class="glass-panel rounded-xl p-6">
            <h2 class="text-2xl font-bold mb-4">Pending Submissions</h2>
            <div id="pending-list" class="space-y-4">
                <!-- Pending rices will be listed here -->
                <div class="text-gray-400">No pending submissions (placeholder)</div>
            </div>
        </section>
        <!-- Stats Section -->
        <section id="stats-section" class="glass-panel rounded-xl p-6 hidden">
            <h2 class="text-2xl font-bold mb-4">Stats</h2>
            <div class="flex flex-col md:flex-row gap-8 items-start">
                <div class="space-y-2">
                    <div>Total Rices: <span id="stat-total" class="font-bold">0</span></div>
                    <div>Unique WMs: <span id="stat-wms" class="font-bold">0</span></div>
                    <div>Unique Themes: <span id="stat-themes" class="font-bold">0</span></div>
                    <div>Unique DEs: <span id="stat-des" class="font-bold">0</span></div>
                    <div>Unique Distros: <span id="stat-distros" class="font-bold">0</span></div>
                </div>
                <div class="flex-1">
                    <div class="flex justify-end items-center mb-4">
                      <button id="toggle-chart-type" class="text-sm px-4 py-2 font-mono rounded border border-[var(--border-color)] hover:bg-white/10">
                        🎛️ View: WM
                      </button>
                    </div>

                    <!-- 👇 Add max-w and aspect control to the canvas wrapper -->
                    <div class="w-full max-w-md mx-auto">
                      <canvas id="stats-pie" width="500" height="500"></canvas>
                    </div>
                </div>
            </div>
        </section>
        <!-- Keywords Section -->
        <section id="keywords-section" class="glass-panel rounded-xl p-6 hidden">
            <h2 class="text-2xl font-bold mb-4">Keywords Management</h2>
            <div id="keywords-content">
                <!-- Keywords content will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Delete Confirmation Dialog -->
    <div id="delete-dialog" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60">
      <div class="glass-panel rounded-2xl p-8 w-full max-w-sm mx-auto flex flex-col items-center" style="box-shadow: 0 0 50px var(--accent-glow);">
        <h2 class="text-2xl font-bold mb-4 text-white">Delete Image</h2>
        <p class="text-gray-300 mb-6 text-center">Are you sure you want to delete this image? This action cannot be undone.</p>
        <div class="flex gap-4">
          <button id="delete-confirm" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button>
          <button id="delete-cancel" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Mood Switcher -->
    <div id="mood-switcher-container" class="fixed bottom-4 right-4 z-40">
        <div id="mood-switcher-panel" class="absolute bottom-0 right-16 grid grid-cols-4 gap-3 p-2 rounded-2xl glass-panel place-items-center"></div>
        <button id="mood-switcher-btn" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-xl transition-all hover:scale-110" style="background:var(--accent-color)">🎨</button>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        let keywordsCache = {};
        let currentChartType = 'wm';
        window.latestStats = null;

        async function loadKeywords() {
            try {
                const res = await fetch('/api/system?action=keywords');
                if (res.ok) {
                    keywordsCache = await res.json();
                }
            } catch (e) {
                console.error('Failed to load keywords:', e);
            }
        }

        async function updateRiceStatus(id, status) {
            try {
                const res = await fetch('/api/admin?action=updateStatus', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id, status })
                });

                const result = await res.json();

                if (!res.ok) {
                    throw new Error(result.error || 'Failed to update status');
                }

                return result;
            } catch (error) {
                console.error(`❌ Error updating status for ${id}:`, error);
                alert(`❌ Failed to update status: ${error.message}`);
            }
        }

        async function updateRiceDetails(id, data) {
            try {
                const res = await fetch('/api/rices?action=updateRice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ _id: id, ...data })
                });
                const result = await res.json();
                if (!res.ok) {
                    throw new Error(result.error || 'Failed to update rice');
                }
                return result;
            } catch (error) {
                console.error(`❌ Error updating rice ${id}:`, error);
                alert(`❌ Failed to update rice: ${error.message}`);
            }
        }

        async function deleteImage(url) {
            try {
                const res = await fetch('/api/upload?action=deleteImage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ url })
                });
                const result = await res.json();
                if (!res.ok) {
                    throw new Error(result.error || 'Failed to delete image');
                }
                return result;
            } catch (error) {
                console.error(`❌ Error deleting image ${url}:`, error);
                alert(`❌ Failed to delete image: ${error.message}`);
            }
        }

        async function fetchPendingRices() {
            const res = await fetch('/api/admin?action=getPendingRices', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) {
                alert('Session expired. Please login again.');
                localStorage.removeItem('adminToken');
                window.location.href = '/';
                return;
            }
            const rices = await res.json();
            renderPendingRices(rices);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Tab switching logic
            const tabSubmissions = document.getElementById('tab-submissions');
            const tabStats = document.getElementById('tab-stats');
            const tabKeywords = document.getElementById('tab-keywords');
            const submissionsSection = document.getElementById('submissions-section');
            const statsSection = document.getElementById('stats-section');
            const keywordsSection = document.getElementById('keywords-section');
            tabSubmissions.addEventListener('click', () => {
                tabSubmissions.classList.add('active');
                tabStats.classList.remove('active');
                tabKeywords.classList.remove('active');
                submissionsSection.classList.remove('hidden');
                statsSection.classList.add('hidden');
                keywordsSection.classList.add('hidden');
            });
            tabStats.addEventListener('click', () => {
                tabStats.classList.add('active');
                tabSubmissions.classList.remove('active');
                tabKeywords.classList.remove('active');
                statsSection.classList.remove('hidden');
                submissionsSection.classList.add('hidden');
                keywordsSection.classList.add('hidden');
                fetchStats();
            });
            tabKeywords.addEventListener('click', () => {
                tabKeywords.classList.add('active');
                tabSubmissions.classList.remove('active');
                tabStats.classList.remove('active');
                keywordsSection.classList.remove('hidden');
                submissionsSection.classList.add('hidden');
                statsSection.classList.add('hidden');
                fetchKeywords();
            });

            // --- Admin API Integration ---
            if (!token) {
                alert('Not authorized. Please login.');
                window.location.href = '/';
            }


        // Fetch stats from backend
        async function fetchStats() {
            try {
                const res = await fetch('/api/system?action=stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    alert('Session expired. Please login again.');
                    localStorage.removeItem('adminToken');
                    window.location.href = '/';
                    return;
                }
                if (!res.ok) {
                    console.error('Failed to fetch stats:', await res.text());
                    return;
                }
                const data = await res.json();
                window.latestStats = data;
                renderStats(data);
            } catch (err) {
                console.error('Stats fetch error:', err);
            }
        }

            fetchPendingRices();

            // Stats tab toggle and rendering

            const toggleBtn = document.getElementById('toggle-chart-type');
            toggleBtn.addEventListener('click', () => {
                const types = ['wm', 'theme', 'de', 'distro'];
                const currentIndex = types.indexOf(currentChartType);
                currentChartType = types[(currentIndex + 1) % types.length];
                if (window.latestStats) renderStats(window.latestStats);
            });

            // Render pie chart
            function renderStats(stats) {
                if (!stats || typeof stats !== 'object') {
                    console.error('Invalid stats data');
                    return;
                }
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-wms').textContent = Object.keys(stats.wm || {}).length;
                document.getElementById('stat-themes').textContent = Object.keys(stats.theme || {}).length;
                document.getElementById('stat-des').textContent = Object.keys(stats.de || {}).length;
                document.getElementById('stat-distros').textContent = Object.keys(stats.distro || {}).length;

                const ctx = document.getElementById('stats-pie').getContext('2d');
                if (window.statsPieChart) window.statsPieChart.destroy();

                let dataSource;
                let buttonText;
                if (currentChartType === 'wm') {
                    dataSource = stats.wm;
                    buttonText = '🎛️ View: WM';
                } else if (currentChartType === 'theme') {
                    dataSource = stats.theme;
                    buttonText = '🎨 View: Themes';
                } else if (currentChartType === 'de') {
                    dataSource = stats.de;
                    buttonText = '🖥️ View: DE';
                } else {
                    dataSource = stats.distro;
                    buttonText = '🐧 View: Distro';
                }

                if (!dataSource || typeof dataSource !== 'object') {
                    console.error('No data for chart');
                    return;
                }

                // Update button label
                toggleBtn.textContent = buttonText;

                const darkColors = [
                '#8ec07c', '#fabd2f', '#83a598', '#d3869b', '#fe8019',
                '#b8bb26', '#fb4934', '#928374', '#458588', '#cc241d'
                ];

                window.statsPieChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(dataSource),
                    datasets: [{
                    data: Object.values(dataSource),
                    backgroundColor: darkColors,
                    borderColor: '#222',
                    borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                    legend: {
                        labels: {
                        color: '#cfcfcf',
                        font: { family: 'JetBrains Mono', size: 14 },
                        padding: 16
                        },
                        position: 'bottom'
                    },
                    tooltip: {
                        backgroundColor: '#1f1f1f',
                        titleColor: '#ffffff',
                        bodyColor: '#dddddd',
                        titleFont: { family: 'JetBrains Mono', size: 14 },
                        bodyFont: { family: 'JetBrains Mono', size: 12 }
                    }
                    }
                }
                });
            }

            // Update fetchStats to store latestStats
            fetchStats = (async function() {
                try {
                    const res = await fetch('/api/system?action=stats', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401) {
                        alert('Session expired. Please login again.');
                        localStorage.removeItem('adminToken');
                        window.location.href = '/';
                        return;
                    }
                    if (!res.ok) {
                        console.error('Failed to fetch stats:', await res.text());
                        return;
                    }
                    const data = await res.json();
                    window.latestStats = data;
                    renderStats(data);
                } catch (err) {
                    console.error('Stats fetch error:', err);
                }
            });
        });
        // HTML templates
        const viewHTML = (rice) => {
            const customBadges = [];
            if (rice.isCustomTheme) customBadges.push('<span class="bg-yellow-500/20 text-yellow-300 px-2 py-1 rounded text-xs border border-yellow-500/30">Custom Theme</span>');
            if (rice.isCustomDistro) customBadges.push('<span class="bg-yellow-500/20 text-yellow-300 px-2 py-1 rounded text-xs border border-yellow-500/30">Custom Distro</span>');
            if (rice.isCustomEnvironment) customBadges.push('<span class="bg-yellow-500/20 text-yellow-300 px-2 py-1 rounded text-xs border border-yellow-500/30">Custom WM/DE</span>');
            const badgesHTML = customBadges.length > 0 ? `<div class="flex gap-1 mt-2">${customBadges.join('')}</div>` : '';

            return `
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <div class="text-2xl">🌾</div>
                    <div class="font-bold text-lg" style="color: var(--text-color)">${rice.author || 'Anonymous'}</div>
                </div>
                ${badgesHTML}
                <div class="font-mono text-sm mt-2 flex flex-wrap items-center gap-2" style="color: var(--muted-text)">
                    <span class="bg-white/5 px-2 py-1 rounded">${(rice.environment && rice.environment.name) || 'Unknown'}</span>
                    <span style="color: var(--border-color)">·</span>
                    <span class="bg-white/5 px-2 py-1 rounded">${rice.distro || 'Unknown'}</span>
                    ${rice.theme ? `
                    <span style="color: var(--border-color)">·</span>
                    <span class="bg-white/5 px-2 py-1 rounded">${rice.theme}</span>
                    ` : ''}
                </div>
                <div class="flex gap-3 mt-3">
                    ${rice.dotfiles ? `
                        <a href="${rice.dotfiles}" target="_blank" class="flex items-center gap-1.5 text-sm transition hover:opacity-80" style="color: var(--accent-color)">
                            <span class="material-icons-outlined text-base">code</span>
                            <span>Dotfiles</span>
                        </a>
                    ` : ''}
                    ${rice.reddit_post ? `
                        <a href="${rice.reddit_post}" target="_blank" class="flex items-center gap-1.5 text-sm transition hover:opacity-80" style="color: var(--accent-color)">
                            <span class="material-icons-outlined text-base">link</span>
                            <span>Reddit</span>
                        </a>
                    ` : ''}
                </div>
                ${(rice.images || []).length > 0 ? `
                <div class="flex gap-2 mt-3 overflow-hidden">
                    ${(rice.images || []).slice(0, 3).map(image => {
                        // Handle array format ["filename.jpg", "fileId"] or object {url: "..."}
                        let filename = '';
                        if (Array.isArray(image)) {
                            filename = image[0];
                        } else if (image && typeof image === 'object') {
                            filename = image.url;
                        } else if (typeof image === 'string') {
                            filename = image;
                        }
                        const imgUrl = filename ? `https://ik.imagekit.io/y1n9qg16a/rices/${filename}` : '';
                        return imgUrl ? new OptimizedImage({
                            src: imgUrl,
                            alt: 'Rice thumbnail',
                            className: 'w-24 h-14 object-cover rounded-md border border-white/10 hover:border-[var(--accent-color)] transition',
                            variant: 'thumbnail'
                        }).toHTML() : '';
                    }).join('')}
                    ${(rice.images || []).length > 3 ? `
                        <div class="w-24 h-14 rounded-md border border-white/10 bg-white/5 flex items-center justify-center text-xs text-gray-400">
                            +${(rice.images || []).length - 3}
                        </div>
                    ` : ''}
                </div>
                ` : ''}
            </div>
            <div class="flex gap-2 flex-shrink-0">
                <button class="edit-btn px-4 py-2 rounded-lg bg-blue-600/80 text-white font-semibold hover:bg-blue-600 transition" data-id="${rice._id}">
                    <span class="material-icons-outlined text-sm">edit</span>
                </button>
                <button class="approve-btn px-4 py-2 rounded-lg bg-green-600/80 text-white font-semibold hover:bg-green-600 transition" data-id="${rice._id}">
                    <span class="material-icons-outlined text-sm">check</span>
                </button>
                <button class="reject-btn px-4 py-2 rounded-lg bg-red-600/80 text-white font-semibold hover:bg-red-600 transition" data-id="${rice._id}">
                    <span class="material-icons-outlined text-sm">close</span>
                </button>
            </div>
            `;
        };
        const editHTML = (rice, keywords) => {
            const wmOptions = keywords?.wm ? Object.keys(keywords.wm) : [];
            const deOptions = keywords?.de ? Object.keys(keywords.de) : [];
            const distroOptions = keywords?.distro ? Object.keys(keywords.distro) : [];
            const themeOptions = keywords?.theme ? Object.keys(keywords.theme) : [];

            const isWM = rice.environment?.type === 'WM';
            const wmdeOptions = isWM ? wmOptions : deOptions;
            const currentWmde = rice.environment?.name || '';
            const isWmdeCustom = !wmdeOptions.includes(currentWmde);

            const isDistroCustom = rice.distro && !distroOptions.includes(rice.distro);
            const isThemeCustom = rice.theme && !themeOptions.includes(rice.theme);

            return `
            <div class="flex-1 max-h-[60vh] overflow-y-auto pr-2">
            <div class="mb-2">
                <label class="block text-sm font-medium text-gray-300">Reddit Post</label>
                <div class="flex items-center gap-2 mt-1">
                    <input type="url" value="${rice.reddit_post || ''}" class="reddit-input flex-1 p-2 rounded bg-gray-700 text-white" />
                    <button type="button" class="populate-btn px-3 py-2 rounded bg-blue-600 text-white text-sm font-mono hover:bg-blue-700">Populate</button>
                </div>
            </div>
            <div class="mb-2">
                <label class="block text-sm font-medium text-gray-300">Author</label>
                <input type="text" value="${rice.author || ''}" class="author-input w-full p-2 rounded bg-gray-700 text-white" />
            </div>
            <div class="mb-2">
                <label class="block text-sm font-medium text-gray-300">Type</label>
                <select class="env-type-input w-full p-2 rounded bg-gray-700 text-white">
                    <option value="WM" ${isWM ? 'selected' : ''}>WM (Window Manager)</option>
                    <option value="DE" ${!isWM ? 'selected' : ''}>DE (Desktop Environment)</option>
                </select>
            </div>
            <div class="mb-2">
                <label class="block text-sm font-medium text-gray-300">${isWM ? 'WM' : 'DE'} Name</label>
                <select class="env-name-input w-full p-2 rounded bg-gray-700 text-white">
                    <option value="">Select or choose Other</option>
                    ${wmdeOptions.map(opt => `<option value="${opt}" ${opt === currentWmde ? 'selected' : ''}>${opt}</option>`).join('')}
                    <option value="Other" ${isWmdeCustom ? 'selected' : ''}>Other</option>
                </select>
                <input type="text" value="${isWmdeCustom ? currentWmde : ''}" class="env-name-custom w-full mt-1 p-2 rounded bg-gray-700 text-white ${isWmdeCustom ? '' : 'hidden'}" placeholder="Enter custom ${isWM ? 'WM' : 'DE'}" />
            </div>
            <div class="mb-2">
                <label class="block text-sm font-medium text-gray-300">Distro</label>
                <select class="distro-input w-full p-2 rounded bg-gray-700 text-white">
                    <option value="">Select or choose Other</option>
                    ${distroOptions.map(opt => `<option value="${opt}" ${opt === rice.distro ? 'selected' : ''}>${opt}</option>`).join('')}
                    <option value="Other" ${isDistroCustom ? 'selected' : ''}>Other</option>
                </select>
                <input type="text" value="${isDistroCustom ? rice.distro : ''}" class="distro-custom w-full mt-1 p-2 rounded bg-gray-700 text-white ${isDistroCustom ? '' : 'hidden'}" placeholder="Enter custom distro" />
            </div>
            <div class="mb-2">
                <label class="block text-sm font-medium text-gray-300">Theme</label>
                <select class="theme-input w-full p-2 rounded bg-gray-700 text-white">
                    <option value="">Select or choose Other</option>
                    ${themeOptions.map(opt => `<option value="${opt}" ${opt === rice.theme ? 'selected' : ''}>${opt}</option>`).join('')}
                    <option value="Other" ${isThemeCustom ? 'selected' : ''}>Other</option>
                </select>

            });
            rejectBtn.addEventListener('click', async () => {

                rejectBtn.textContent = 'Rejecting...';
                await updateRiceStatus(rejectBtn.dataset.id, 'rejected');
                fetchPendingRices();

        function attachEditHandlers(div, rice) {

            const cancelBtn = div.querySelector('.cancel-btn');
            const populateBtn = div.querySelector('.populate-btn');

            // Toggle functions for custom inputs

                const select = div.querySelector('.env-name-input');
                const custom = div.querySelector('.env-name-custom');
                const isOther = select.value === 'Other';
                custom.classList.toggle('hidden', !isOther);
                if (isOther) custom.focus();

            function toggleDistroCustom() {
                const select = div.querySelector('.distro-input');

                custom.classList.toggle('hidden', !isOther);
                if (isOther) custom.focus();

                    ? (keywordsCache.wm ? Object.keys(keywordsCache.wm) : [])
                    : (keywordsCache.de ? Object.keys(keywordsCache.de) : []);

                // Save current selection
                const currentVal = envNameSelect.value;

                    options.map(opt => `<option value="${opt}">${opt}</option>`).join('') +
                    '<option value="Other">Other</option>';

                // Restore selection if valid
                if (options.includes(currentVal)) envNameSelect.value = currentVal;
                else if (currentVal === 'Other') envNameSelect.value = 'Other';

                toggleEnvNameCustom();
            });

            div.querySelector('.env-type-input').addEventListener('change', () => {

                const envNameLabel = label.parentElement.querySelector('label');
                if (envNameLabel) {
                    envNameLabel.textContent = type === 'WM' ? 'WM Name' : 'DE Name';
                }
                div.querySelector('.env-name-input').dispatchEvent(new Event('change'));
            });

            div.querySelector('.distro-input').addEventListener('change', toggleDistroCustom);

            // Initialize custom input states
            toggleEnvNameCustom();
            toggleDistroCustom();
            toggleThemeCustom();

            // Populate button handler
            populateBtn.addEventListener('click', () => {
                const redditInput = div.querySelector('.reddit-input');
                const redditUrl = redditInput.value.trim();

                if (!redditUrl || !redditUrl.includes('reddit.com')) {
                    alert('❌ Please enter a valid Reddit post URL');
                    return;
                }

                populateBtn.disabled = true;
                populateBtn.textContent = 'Fetching...';

                fetch('/api/system?action=scrapeReddit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: redditUrl })
                }).then(res => res.json()).then(data => {
                    if (!res.ok) throw new Error(data.error || 'Failed to scrape Reddit');

                    // Populate fields
                    redditInput.value = data.reddit_post || redditUrl;
                    div.querySelector('.author-input').value = data.author || '';
                    div.querySelector('.env-type-input').value = data.environment?.type || 'WM';
                    div.querySelector('.env-type-input').dispatchEvent(new Event('change'));

                    // Set WM/DE (select or custom)
                    const envNameSelect = div.querySelector('.env-name-input');
                    const envNameCustom = div.querySelector('.env-name-custom');
                    const envName = data.environment?.name || '';
                    const wmdeOptions = data.environment?.type === 'WM'
                        ? (keywordsCache.wm ? Object.keys(keywordsCache.wm) : [])
                        : (keywordsCache.de ? Object.keys(keywordsCache.de) : []);
                    if (wmdeOptions.includes(envName)) {
                        envNameSelect.value = envName;
                        envNameCustom.classList.add('hidden');
                    } else {
                        envNameSelect.value = 'Other';
                        envNameCustom.value = envName;
                        envNameCustom.classList.remove('hidden');
                    }

                    // Set distro (select or custom)
                    const distroSelect = div.querySelector('.distro-input');
                    const distroCustom = div.querySelector('.distro-custom');
                    const distroOptions = keywordsCache.distro ? Object.keys(keywordsCache.distro) : [];
                    if (distroOptions.includes(data.distro)) {
                        distroSelect.value = data.distro;
                        distroCustom.classList.add('hidden');
                    } else {
                        distroSelect.value = 'Other';
                        distroCustom.value = data.distro || '';
                        distroCustom.classList.remove('hidden');
                    }

                    // Set theme (select or custom)
                    const themeSelect = div.querySelector('.theme-input');
                    const themeCustom = div.querySelector('.theme-custom');
                    const themeOptions = keywordsCache.theme ? Object.keys(keywordsCache.theme) : [];
                    if (themeOptions.includes(data.theme)) {
                        themeSelect.value = data.theme;
                        themeCustom.classList.add('hidden');
                    } else {

                        themeCustom.value = data.theme || '';
                        themeCustom.classList.remove('hidden');
                    }

                    div.querySelector('.dotfiles-input').value = data.dotfiles || '';

                    // Step 2: Upload images to ImageKit
                    if (Array.isArray(data.screenshots) && data.screenshots.length > 0) {
                        populateBtn.textContent = 'Uploading images...';

                        return fetch('/api/upload?action=uploadToImageKit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ urls: data.screenshots })
                        }).then(imgRes => imgRes.json()).then(imgData => {
                            if (imgRes.ok && imgData.images) {
                                currentImages = imgData.images.map(img => ({
                                    url: img.url,
                                    fileId: img.fileId
                                }));
                            } else {
                                // Fallback to raw URLs if upload fails

                            }

                            const container = div.querySelector('.images-container');
                            container.innerHTML = currentImages.map((image, index) => {
                                let filename = '';
                                let fileId = '';
                                if (Array.isArray(image)) {
                                    filename = image[0];
                                    fileId = image[1] || '';
                                } else if (image && typeof image === 'object') {
                                    filename = image.url;
                                    fileId = image.fileId || '';
                                } else if (typeof image === 'string') {
                                    filename = image;
                                }
                                const imgUrl = filename ? `https://ik.imagekit.io/y1n9qg16a/rices/${filename}` : '';
                                return imgUrl ? `
                                <div class="relative">
                                    ${new OptimizedImage({
                                        src: imgUrl,
                                        alt: 'Rice image',
                                        className: 'w-20 h-12 object-cover rounded-md',
                                        variant: 'thumbnail'
                                    }).toHTML()}

                                </div>` : '';
                            }).join('');

                            // Re-attach delete handlers
                            div.querySelectorAll('.delete-image-btn').forEach(btn => {
                                btn.addEventListener('click', () => {
                                    const index = parseInt(btn.dataset.index);
                                    const url = btn.dataset.url;
                                    pendingDelete = { index, url, currentImages, updateImagesContainer };
                                    deleteDialog.classList.replace('hidden', 'flex');
                                });
                            });

                            alert('✅ Successfully populated from Reddit!');
                        });
                    } else {
                        alert('✅ Successfully populated from Reddit!');
                        return Promise.resolve();
                    }
                }).catch(err => {
                    console.error('❌ Scrape failed:', err);
                    alert('❌ Failed to fetch data from Reddit. Check the URL or try again.');
                }).finally(() => {
                    populateBtn.disabled = false;
                    populateBtn.textContent = 'Populate';
                });
            });

            saveBtn.addEventListener('click', () => {
                const author = div.querySelector('.author-input').value;
                const envType = div.querySelector('.env-type-input').value;

                // Get WM/DE value (from select or custom input)
                const envNameSelect = div.querySelector('.env-name-input');
                let env = envNameSelect.value === 'Other'
                    ? div.querySelector('.env-name-custom').value
                    : envNameSelect.value;

                // Get distro value (from select or custom input)
                const distroSelect = div.querySelector('.distro-input');
                let distro = distroSelect.value === 'Other'
                    ? div.querySelector('.distro-custom').value
                    : distroSelect.value;

                // Get theme value (from select or custom input)
                const themeSelect = div.querySelector('.theme-input');
                let theme = themeSelect.value === 'Other'
                    ? div.querySelector('.theme-custom').value
                    : themeSelect.value;

                const dotfiles = div.querySelector('.dotfiles-input').value;
                const reddit = div.querySelector('.reddit-input').value;

                const data = {
                    author,
                    theme,
                    environment: { type: envType, name: env },
                    distro,
                    dotfiles,
                    reddit_post: reddit,
                    images: currentImages.map(image => {
                        const filename = image.url.split('/').pop();
                        return [filename, image.fileId || ''];
                    })
                };
                updateRiceDetails(rice._id, data).then(() => {
                    // Refresh the entire list with updated data from DB
                    fetchPendingRices();

            cancelBtn.addEventListener('click', () => {

            // Image deletion handlers
            function updateImagesContainer(images) {
                const container = div.querySelector('.images-container');
                container.innerHTML = images.map((image, index) => {
                    let filename = '';
                    let fileId = '';
                    if (Array.isArray(image)) {
                        filename = image[0];
                        fileId = image[1] || '';
                    } else if (image && typeof image === 'object') {
                        filename = image.url;
                        fileId = image.fileId || '';
                    } else if (typeof image === 'string') {
                        filename = image;
                    }
                    const imgUrl = filename ? `https://ik.imagekit.io/y1n9qg16a/rices/${filename}` : '';

                    </div>` : '';
                }).join('');
                // Re-attach delete handlers
                div.querySelectorAll('.delete-image-btn').forEach(btn => {

                        const index = parseInt(btn.dataset.index);
                        const url = btn.dataset.url;
                        pendingDelete = { index, url, currentImages, updateImagesContainer };
                        deleteDialog.classList.replace('hidden', 'flex');

            updateImagesContainer(currentImages); // initial attach

        function renderPendingRices(rices) {

        // Keywords management
        async function fetchKeywords() {
            const res = await fetch('/api/system?action=keywords', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) {
                alert('Session expired. Please login again.');
                localStorage.removeItem('adminToken');
                window.location.href = '/';
                return;
            }
            const keywords = await res.json();
            renderKeywords(keywords);
        }

        function renderKeywords(keywords) {
            const content = document.getElementById('keywords-content');
            let html = '<div class="mb-6">';
            html += '<div class="flex gap-4 mb-4">';

            html += '<div id="form-container"></div>';
            html += '</div>';
            html += '<div id="current-keywords"><h3 class="text-xl font-bold mb-4">Current Keywords</h3></div>';
            content.innerHTML = html;

            let currentMode = 'canonical'; // default

            const modeVariantBtn = document.getElementById('mode-variant');
            const modeCanonicalBtn = document.getElementById('mode-canonical');
            const formContainer = document.getElementById('form-container');

            function renderForm() {

                    formHtml += '<select id="canonical-select" class="w-full p-2 rounded bg-gray-700 text-white">';

                    formHtml += '<div><label class="block text-sm font-medium text-gray-300">New Variant</label>';
                    formHtml += '<input type="text" id="variant-input" class="w-full p-2 rounded bg-gray-700 text-white" placeholder="e.g., ubuntu os" /></div>';

        }

        // Render pie chart
        function renderStats(stats) {
            if (!stats || typeof stats !== 'object') {
                console.error('Invalid stats data');
                return;
            }
            const totalKeywords = Object.values(stats).reduce((sum, cat) => sum + Object.keys(cat).length, 0);
            document.getElementById('stat-total').textContent = totalKeywords;
            document.getElementById('stat-wms').textContent = Object.keys(stats.wm || {}).length;
            document.getElementById('stat-themes').textContent = Object.keys(stats.theme || {}).length;
            document.getElementById('stat-des').textContent = Object.keys(stats.de || {}).length;
            document.getElementById('stat-distros').textContent = Object.keys(stats.distro || {}).length;

            const ctx = document.getElementById('stats-pie').getContext('2d');
            if (window.statsPieChart) window.statsPieChart.destroy();

            let dataSource;
            let buttonText;
            if (currentChartType === 'wm') {
                dataSource = stats.wm;
                buttonText = '🎛️ View: WM';
            } else if (currentChartType === 'theme') {
                dataSource = stats.theme;
                buttonText = '🎨 View: Themes';
            } else if (currentChartType === 'de') {
                dataSource = stats.de;
                buttonText = '🖥️ View: DE';
            } else {
                dataSource = stats.distro;
                buttonText = '🐧 View: Distro';
            }

            if (!dataSource || typeof dataSource !== 'object') {
                console.error('No data for chart');
                return;
            }

            // Update button label
            toggleBtn.textContent = buttonText;

            const darkColors = [
            '#8ec07c', '#fabd2f', '#83a598', '#d3869b', '#fe8019',
            '#b8bb26', '#fb4934', '#928374', '#458588', '#cc241d'
            ];

            window.statsPieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(dataSource),
                datasets: [{
                data: Object.values(dataSource),
                backgroundColor: darkColors,
                borderColor: '#222',
                borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                legend: {
                    labels: {
                    color: '#cfcfcf',
                    font: { family: 'JetBrains Mono', size: 14 },
                    padding: 16
                    },
                    position: 'bottom'
                },
                tooltip: {
                    backgroundColor: '#1f1f1f',
                    titleColor: '#ffffff',
                    bodyColor: '#dddddd',
                    titleFont: { family: 'JetBrains Mono', size: 14 },
                    bodyFont: { family: 'JetBrains Mono', size: 12 }
                }
                }
            }
            });
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/';
        });
        // Delete dialog handlers
        const deleteDialog = document.getElementById('delete-dialog');
        const deleteConfirm = document.getElementById('delete-confirm');
        const deleteCancel = document.getElementById('delete-cancel');
        let pendingDelete = null;

        deleteConfirm.addEventListener('click', async () => {
            if (pendingDelete) {
                const { index, url, currentImages, updateImagesContainer } = pendingDelete;
                try {
                    await deleteImage(url);
                    currentImages.splice(index, 1);
                    updateImagesContainer(currentImages);
                } catch (error) {
                    // error already alerted
                }
                pendingDelete = null;
            }
            deleteDialog.classList.replace('flex', 'hidden');
        });

        deleteCancel.addEventListener('click', () => {
            pendingDelete = null;
            deleteDialog.classList.replace('flex', 'hidden');
        });

        // --- Theme Toggle Logic ---
        (function() {
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const themeIcon = themeToggleBtn.querySelector('span');

            // Mood switcher themes (matching index.html)
            const darkThemes = [ { name: 'Blue', color: '#5D5FEF', glow: 'rgba(30, 58, 138, 0.5)' }, { name: 'Forest Green', color: '#14532d', glow: 'rgba(20, 83, 45, 0.5)' }, { name: 'Burgundy', color: '#7c2d12', glow: 'rgba(124, 45, 18, 0.5)' }, { name: 'Deep Blue', color: '#1e3a8a', glow: 'rgba(30, 41, 59, 0.5)' }, ];
            const lightThemes = [ { name: 'Pastel Pink', color: '#F48FB1', glow: 'rgba(244, 143, 177, 0.5)' }, { name: 'Sky Blue', color: '#87CEEB', glow: 'rgba(135, 206, 235, 0.5)' }, { name: 'Lavender', color: '#d374f2', glow: 'rgba(230, 230, 250, 0.5)' }, { name: 'Mint', color: '#98FB98', glow: 'rgba(152, 251, 152, 0.5)' }, ];
            let moodThemes = darkThemes;

            const moodSwitcherBtn = document.getElementById('mood-switcher-btn');
            const moodSwitcherPanel = document.getElementById('mood-switcher-panel');

            function applyTheme(theme) {
                document.documentElement.style.setProperty('--accent-color', theme.color);
                document.documentElement.style.setProperty('--accent-glow', theme.glow);
                moodSwitcherBtn.style.background = `linear-gradient(45deg, ${theme.color}, ${theme.glow})`;
                localStorage.setItem('rice-gallery-theme', theme.name);
            }

            function updateMoodSwitcherPanel() {
                moodSwitcherPanel.innerHTML = '';
                moodThemes.forEach(theme => {
                    const btn = document.createElement('button');
                    btn.className = 'w-8 h-8 rounded-full transition-transform hover:scale-110';
                    btn.style.background = `linear-gradient(45deg, ${theme.color}, ${theme.glow})`;
                    btn.title = theme.name;
                    btn.addEventListener('click', () => applyTheme(theme));
                    moodSwitcherPanel.appendChild(btn);
                });
            }

            function initMoodSwitcher() {
                updateMoodSwitcherPanel();
                const savedTheme = localStorage.getItem('rice-gallery-theme');
                if (savedTheme && moodThemes.find(t => t.name === savedTheme)) {
                    applyTheme(moodThemes.find(t => t.name === savedTheme));
                } else {
                    applyTheme(moodThemes[0]);
                }
                moodSwitcherBtn.addEventListener('click', () => moodSwitcherPanel.classList.toggle('open'));
            }

            function applyThemeMode(isLight) {
                if (isLight) {
                    document.documentElement.classList.add('light-mode');
                    document.body.className = 'min-h-screen text-gray-800';
                    themeIcon.textContent = 'light_mode';
                    localStorage.setItem('theme-mode', 'light');
                } else {
                    document.documentElement.classList.remove('light-mode');
                    document.body.className = 'min-h-screen text-gray-300';
                    themeIcon.textContent = 'dark_mode';
                    localStorage.setItem('theme-mode', 'dark');
                }
                // Update mood switcher themes based on mode
                moodThemes = isLight ? lightThemes : darkThemes;
                updateMoodSwitcherPanel();
                // Apply saved theme preference if it exists and is valid
                const savedMoodTheme = localStorage.getItem('rice-gallery-theme');
                if (savedMoodTheme && moodThemes.find(t => t.name === savedMoodTheme)) {
                    applyTheme(moodThemes.find(t => t.name === savedMoodTheme));
                } else {
                    applyTheme(moodThemes[0]);
                }
            }

            // Load saved light/dark mode - default to light (matching index.html behavior)
            const savedThemeMode = localStorage.getItem('theme-mode');
            const isLight = savedThemeMode !== 'dark';

            // Set moodThemes based on saved light/dark mode BEFORE initializing
            moodThemes = isLight ? lightThemes : darkThemes;

            // Initialize mood switcher (uses the correct moodThemes array)
            initMoodSwitcher();

            // Apply light/dark mode
            applyThemeMode(isLight);

            themeToggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const savedScroll = window.scrollY;
                const isLight = document.documentElement.classList.contains('light-mode');
                applyThemeMode(!isLight);
                // Restore scroll position after theme change
                setTimeout(() => window.scrollTo(0, savedScroll), 100);
            });
        })();
    </script>

    <!-- Floating Theme Toggle Button -->
    <button id="theme-toggle-btn" class="fixed bottom-20 right-4 z-40 w-12 h-12 glass-panel rounded-full hover:bg-white/10 transition-all hover:scale-110 shadow-lg flex items-center justify-center" title="Toggle Dark/Light Mode">
        <span class="material-icons-outlined">dark_mode</span>
    </button>
