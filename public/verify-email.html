<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Rice Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined&family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-color: #5D5FEF;
      --accent-glow: rgba(93, 95, 239, 0.3);
      --bg-color: #0a0a0f;
      --text-color: #ffffff;
      --muted-text: #888888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 3rem 2rem;
      box-shadow: 0 0 50px var(--accent-glow);
    }

    .logo {
      font-size: 4rem;
      color: var(--accent-color);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    p {
      color: var(--muted-text);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(93, 95, 239, 0.3);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-icon, .error-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .success-icon {
      color: #4ade80;
    }

    .error-icon {
      color: #f87171;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--accent-color);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .hidden {
      display: none;
    }

    .resend-link {
      color: var(--accent-color);
      text-decoration: none;
      cursor: pointer;
    }

    .resend-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="loading-state">
        <div class="spinner"></div>
        <h1>Verifying your email...</h1>
        <p>Please wait while we verify your email address.</p>
      </div>

      <div id="success-state" class="hidden">
        <div class="success-icon material-icons-outlined">check_circle</div>
        <h1>Email Verified!</h1>
        <p>Your email has been successfully verified. You can now enjoy all the features of Rice Gallery.</p>
        <a href="/" class="btn">Go to Gallery</a>
      </div>

      <div id="error-state" class="hidden">
        <div class="error-icon material-icons-outlined">error</div>
        <h1>Verification Failed</h1>
        <p id="error-message">Something went wrong.</p>
        <a href="/" class="btn">Go to Gallery</a>
      </div>
    </div>
  </div>

  <script>
    async function verifyEmail() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        showError('No verification token provided.');
        return;
      }

      try {
        const response = await fetch('/api/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess();
        } else {
          showError(data.error || 'Verification failed.');
        }
      } catch (err) {
        console.error('Verification error:', err);
        showError('Network error. Please try again.');
      }
    }

    function showSuccess() {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('success-state').classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }

    // Run verification on page load
    verifyEmail();
  </script>
</body>
</html>
